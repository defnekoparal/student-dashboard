<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planning | AI LADA</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="planning.css"/>
</head>

<body>
  <nav>
    <ul class="navbar">
      <li><a href="welcome.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="calendar.html">Calendar</a></li>
      <li><a href="#">Notes</a></li>
      <li><a href="planning.html" class="active">Planning</a></li>
      <li><a href="settings.html">Settings</a></li>
      <li class="logout"><a href="login.html">Log Out</a></li> 
    </ul>
  </nav>

  <header class="hero">
    <h1>Energy-Based Planning</h1>
    <p>Plan based on how you feel — not just time.</p>
  </header>

  <main class="container">

    <!-- ENERGY SELECT -->
    <section class="card">
      <h2>How are you feeling right now?</h2>

      <div class="energy-options">
        <button class="energy-btn" data-energy="tired">😴 Tired</button>
        <button class="energy-btn" data-energy="okay">😐 Okay</button>
        <button class="energy-btn" data-energy="focused">⚡ Focused</button>
      </div>

      <p id="energyMessage" class="energy-message"></p>
    </section>

    <!-- TASKS -->
    <section class="card">
      <h2>Your Suggested Plan</h2>
      <div id="taskContainer" class="task-container">
        <p class="placeholder">Select your energy level to begin.</p>
      </div>
    </section>

  </main>

  <script src="planning.js"></script>
</body>
</html>
