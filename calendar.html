<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar | AI LADA Study Dashboard</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="calendar.css" />
</head>
<body>
  <nav>
    <ul class="navbar">
      <li><a href="welcome.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="calendar.html" class="active">Calendar</a></li>
    </ul>
  </nav>

  <header class="hero">
    <h1>Calendar</h1>
    <p>Organize your month, add tasks, and keep your schedule calm.</p>
  </header>

  <main class="container">
    <section class="card">
      <div class="calendar-top">
        <h2>March 2026</h2>
        <button id="addTaskBtn" type="button">+ Add Task</button>
      </div>

      <div class="month-calendar">
        <div class="day-name">Sun</div>
        <div class="day-name">Mon</div>
        <div class="day-name">Tue</div>
        <div class="day-name">Wed</div>
        <div class="day-name">Thu</div>
        <div class="day-name">Fri</div>
        <div class="day-name">Sat</div>

        <div class="calendar-day" data-day="1">
          <span class="date-number">1</span>
          <div class="task-pill">Hackathon</div>
        </div>

        <div class="calendar-day" data-day="2">
          <span class="date-number">2</span>
        </div>

        <div class="calendar-day" data-day="3">
          <span class="date-number">3</span>
        </div>

        <div class="calendar-day" data-day="4">
          <span class="date-number">4</span>
        </div>

        <div class="calendar-day" data-day="5">
          <span class="date-number">5</span>
        </div>

        <div class="calendar-day" data-day="6">
          <span class="date-number">6</span>
        </div>

        <div class="calendar-day" data-day="7">
          <span class="date-number">7</span>
        </div>

        <div class="calendar-day" data-day="8">
          <span class="date-number">8</span>
        </div>

        <div class="calendar-day" data-day="9">
          <span class="date-number">9</span>
          <div class="task-pill">Calc quiz 9 AM</div>
        </div>

        <div class="calendar-day" data-day="10">
          <span class="date-number">10</span>
        </div>

        <div class="calendar-day" data-day="11">
          <span class="date-number">11</span>
        </div>

        <div class="calendar-day" data-day="12">
          <span class="date-number">12</span>
          <div class="task-pill">Upload notes</div>
        </div>

        <div class="calendar-day" data-day="13">
          <span class="date-number">13</span>
        </div>

        <div class="calendar-day" data-day="14">
          <span class="date-number">14</span>
        </div>

        <div class="calendar-day" data-day="15">
          <span class="date-number">15</span>
        </div>

        <div class="calendar-day" data-day="16">
          <span class="date-number">16</span>
        </div>

        <div class="calendar-day" data-day="17">
          <span class="date-number">17</span>
        </div>

        <div class="calendar-day" data-day="18">
          <span class="date-number">18</span>
        </div>

        <div class="calendar-day" data-day="19">
          <span class="date-number">19</span>
          <div class="task-pill">Bio review</div>
        </div>

        <div class="calendar-day" data-day="20">
          <span class="date-number">20</span>
        </div>

        <div class="calendar-day" data-day="21">
          <span class="date-number">21</span>
        </div>

        <div class="calendar-day" data-day="22">
          <span class="date-number">22</span>
        </div>

        <div class="calendar-day" data-day="23">
          <span class="date-number">23</span>
        </div>

        <div class="calendar-day" data-day="24">
          <span class="date-number">24</span>
        </div>

        <div class="calendar-day" data-day="25">
          <span class="date-number">25</span>
        </div>

        <div class="calendar-day" data-day="26">
          <span class="date-number">26</span>
        </div>

        <div class="calendar-day" data-day="27">
          <span class="date-number">27</span>
        </div>

        <div class="calendar-day" data-day="28">
          <span class="date-number">28</span>
        </div>

        <div class="calendar-day" data-day="29">
          <span class="date-number">29</span>
        </div>

        <div class="calendar-day" data-day="30">
          <span class="date-number">30</span>
        </div>

        <div class="calendar-day" data-day="31">
          <span class="date-number">31</span>
        </div>
      </div>
    </section>
  </main>

  <div class="modal hidden" id="taskModal">
    <div class="modal-content">
      <h2>Add a Task</h2>

      <label for="taskDate">Date</label>
      <select id="taskDate">
        <option value="1">March 1</option>
        <option value="2">March 2</option>
        <option value="3">March 3</option>
        <option value="4">March 4</option>
        <option value="5">March 5</option>
        <option value="6">March 6</option>
        <option value="7">March 7</option>
        <option value="8">March 8</option>
        <option value="9">March 9</option>
        <option value="10">March 10</option>
        <option value="11">March 11</option>
        <option value="12">March 12</option>
        <option value="13">March 13</option>
        <option value="14">March 14</option>
        <option value="15">March 15</option>
        <option value="16">March 16</option>
        <option value="17">March 17</option>
        <option value="18">March 18</option>
        <option value="19">March 19</option>
        <option value="20">March 20</option>
        <option value="21">March 21</option>
        <option value="22">March 22</option>
        <option value="23">March 23</option>
        <option value="24">March 24</option>
        <option value="25">March 25</option>
        <option value="26">March 26</option>
        <option value="27">March 27</option>
        <option value="28">March 28</option>
        <option value="29">March 29</option>
        <option value="30">March 30</option>
        <option value="31">March 31</option>
      </select>

      <label for="taskText">Task</label>
      <input type="text" id="taskText" placeholder="ex: Study chemistry chapter" />

      <div class="modal-buttons">
        <button id="saveTaskBtn" type="button">Save Task</button>
        <button id="closeModalBtn" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
